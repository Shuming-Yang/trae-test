stages:
  - build
  - pages

variables:
  CMAKE_GENERATOR: "Ninja"
  BUILD_DIR: "build"

# 當 .c 或 .h 檔案變更時自動編譯
build_on_commit:
  stage: build
  image: gcc:latest
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "CMakeLists.txt"
  before_script:
    - apt-get update && apt-get install -y cmake ninja-build
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 week

# 每週傍晚（週一至週五 18:00）執行一次編譯檢查
weekly_build_check:
  stage: build
  image: gcc:latest
  only:
    - schedules
  before_script:
    - apt-get update && apt-get install -y cmake ninja-build
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 month

# GitLab Pages - 自動產生文件網站
pages:
  stage: pages
  image: python:3.9-slim
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "**/*.s"
      - "generate_docs.py"
      - "CMakeLists.txt"
    refs:
      - main
      - master
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends \
        gcc \
        make \
        texlive-latex-base \
        texlive-fonts-recommended \
        texlive-fonts-extra \
        texlive-latex-extra \
        pandoc
    - pip install --no-cache-dir mkdocs mkdocs-material pymdown-extensions
  script:
    # 建立 docs 目錄
    - mkdir -p docs
    # 執行自動文件產生腳本
    - python3 generate_docs.py
    # 使用 mkdocs 建立 HTML
    - mkdocs build --site-dir public
    # 建立 PDF (使用 pandoc)
    - cd docs && pandoc index.md -o ../public/trae_test_documentation.pdf --pdf-engine=xelatex -V geometry="margin=2cm"
  artifacts:
    paths:
      - public
    expire_in: 1 month