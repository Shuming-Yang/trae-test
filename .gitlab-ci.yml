variables:
  GIT_SSL_NO_VERIFY: "true"
  CMAKE_GENERATOR: "Ninja"
  BUILD_DIR: "build"

image: atb-compiler-env:v1

cache:
  paths:
    - .cache/pip

stages:
  - build
  - pages

# 當 .c 或 .h 檔案變更時自動編譯
build_on_commit:
  stage: build
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "CMakeLists.txt"
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 week

# 每週傍晚（週一至週五 18:00）執行一次編譯檢查
weekly_build_check:
  stage: build
  only:
    - schedules
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 month

# GitLab Pages - 自動產生文件網站
# GitLab Pages - 自動產生文件網站
pages:
  stage: pages
  
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "docs/**/*"
      - "mkdocs.yml"
      - "tools/gen_module_graph.py"
      - "tools/gen_func_docs.py"
      - "tools/gen_coverage_report.py"
      - "tools/gen_integration_coverage_report.py"
      - "tools/gen_misra_report.py"
      - "tools/gen_code_review.py"
      - "CMakeLists.txt"
    refs:
      - main
      - master
  script:
    # 自動生成 SWE.3 函式文件與流程圖
    - python3 tools/gen_func_docs.py
    # 編譯 unit_test、執行、產生 Coverage 報告
    - python3 tools/gen_coverage_report.py
    # 編譯 integrated_test、執行、產生 Coverage 報告
    - python3 tools/gen_integration_coverage_report.py
    # 執行 MISRA C 2012 靜態分析並產生報告
    - python3 tools/gen_misra_report.py
    # 偵測 src/ 變動並產生 Code Review 紀錄入口
    - python3 tools/gen_code_review.py
    # 使用 mkdocs 建立 HTML，PDF 外掛會在背景自動生成整份文件的 PDF
    - mkdocs build --site-dir public
  artifacts:
    paths:
      - public
    expire_in: 1 month