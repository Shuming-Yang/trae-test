variables:
  GIT_SSL_NO_VERIFY: "true"
  CMAKE_GENERATOR: "Ninja"
  BUILD_DIR: "build"

image: atb-compiler-env:v1

cache:
  paths:
    - .cache/pip

stages:
  - build
  - pages

# 當 .c 或 .h 檔案變更時自動編譯
build_on_commit:
  stage: build
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "CMakeLists.txt"
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 week

# 每週傍晚（週一至週五 18:00）執行一次編譯檢查
weekly_build_check:
  stage: build
  only:
    - schedules
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 month

# GitLab Pages - 自動產生文件網站
pages:
  stage: pages
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "**/*.s"
      - "generate_docs.py"
      - "CMakeLists.txt"
    refs:
      - main
      - master
  script:
    # 安裝文件產生所需的 Python 套件
    - pip install --break-system-packages --no-cache-dir mkdocs mkdocs-material pymdown-extensions
    # 建立 docs 目錄
    - mkdir -p docs
    # 執行自動文件產生腳本
    - python3 generate_docs.py
    # 使用 mkdocs 建立 HTML
    - mkdocs build --site-dir public
    # 使用 weasyprint 直接將 HTML 轉換成 PDF (忽略 CSS 警告)
    - |
      if command -v weasyprint &> /dev/null; then
        if [ -f "public/index.html" ]; then
          weasyprint public/index.html public/trae_test_documentation.pdf 2>/dev/null
        fi
      fi
  artifacts:
    paths:
      - public
    expire_in: 1 month