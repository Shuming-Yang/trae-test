variables:
  GIT_SSL_NO_VERIFY: "true"
  CMAKE_GENERATOR: "Ninja"
  BUILD_DIR: "build"

image: atb-compiler-env:v1

cache:
  paths:
    - .cache/pip

stages:
  - build
  - pages

# 當 .c 或 .h 檔案變更時自動編譯
build_on_commit:
  stage: build
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "CMakeLists.txt"
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 week

# 每週傍晚（週一至週五 18:00）執行一次編譯檢查
weekly_build_check:
  stage: build
  only:
    - schedules
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 month

# GitLab Pages - 自動產生文件網站
# GitLab Pages - 自動產生文件網站
pages:
  stage: pages
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "**/*.s"
      - "generate_docs.py"
      - "CMakeLists.txt"
    refs:
      - main
      - master
  script:
    - mkdir -p docs
    # 執行自動文件產生腳本 (會自動生成所有 markdown 頁面與 mkdocs.yml)
    - python3 generate_docs.py
    # 使用 mkdocs 建立 HTML，PDF 外掛會在背景自動生成整份文件的 PDF
    - mkdocs build --site-dir public
  artifacts:
    paths:
      - public
    expire_in: 1 month
