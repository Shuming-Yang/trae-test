stages:
  - build

variables:
  CMAKE_GENERATOR: "Ninja"
  BUILD_DIR: "build"

# 當 .c 或 .h 檔案變更時自動編譯
build_on_commit:
  stage: build
  image: gcc:latest
  only:
    changes:
      - "**/*.c"
      - "**/*.h"
      - "CMakeLists.txt"
  before_script:
    - apt-get update && apt-get install -y cmake ninja-build
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 week

# 每週傍晚（週一至週五 18:00）執行一次編譯檢查
weekly_build_check:
  stage: build
  image: gcc:latest
  only:
    - schedules
  before_script:
    - apt-get update && apt-get install -y cmake ninja-build
  script:
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - cmake -G $CMAKE_GENERATOR ..
    - ninja
  artifacts:
    paths:
      - $BUILD_DIR/trae_test
    expire_in: 1 week
